<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScuolaOK!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --t:#2eaab1;--td:#1d8a91;--tl:#e8f7f8;--tm:#b2e2e5;
  --gr:#27ae60;--grb:#eafaf1;--or:#f59300;--orb:#fff4e0;
  --re:#e74c3c;--reb:#fdf0ef;--bl:#3498db;--blb:#ebf5fb;
  --gy:#7f8c8d;--gyl:#ecf0f1;--gym:#bdc3c7;--tx:#2c3e50;--sb:#1a7a80;
  --sh:0 2px 12px rgba(0,0,0,.10);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito Sans',sans-serif;background:#f0f4f5;color:var(--tx);min-height:100vh;}
.hidden{display:none!important;}
button,input,select,textarea{font-family:inherit;}
button{cursor:pointer;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:20px;border:none;font-weight:700;font-size:13px;transition:all .15s;white-space:nowrap;}
.bt{background:var(--t);color:#fff;}.bt:hover{background:var(--td);}
.bo{background:transparent;color:var(--t);border:2px solid var(--t);}.bo:hover{background:var(--tl);}
.br{background:var(--re);color:#fff;}.br:hover{background:#c0392b;}
.bg{background:var(--gr);color:#fff;}.bor{background:var(--or);color:#fff;}
.bsm{padding:4px 10px;font-size:11px;border-radius:14px;}
#LP{min-height:100vh;background:linear-gradient(135deg,#1a7a80,#2eaab1,#3fc1c9);display:flex;align-items:center;justify-content:center;padding:20px;}
.lbox{background:#fff;border-radius:20px;padding:44px 40px 36px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:pop .3s ease;}
@keyframes pop{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.llogo{text-align:center;margin-bottom:24px;}
.lico{width:60px;height:60px;background:linear-gradient(135deg,#2eaab1,#1d8a91);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:10px;}
.llogo h1{font-family:'Nunito',sans-serif;font-size:26px;font-weight:900;color:var(--td);}
.llogo p{color:var(--gy);font-size:12px;margin-top:2px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-weight:700;font-size:12px;margin-bottom:5px;}
.fg input{width:100%;padding:11px 14px;border:2px solid var(--gyl);border-radius:9px;font-size:14px;outline:none;}
.fg input:focus{border-color:var(--t);}
.lbtn{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,#2eaab1,#1d8a91);color:#fff;font-size:15px;font-weight:900;cursor:pointer;transition:all .2s;margin-top:4px;}
.lbtn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(46,170,177,.4);}
.ldiv{text-align:center;color:var(--gym);font-size:12px;margin:14px 0;position:relative;}
.ldiv::before,.ldiv::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--gyl);}
.ldiv::before{left:0;}.ldiv::after{right:0;}
.rbtn{width:100%;padding:11px;border-radius:12px;border:2px solid var(--t);background:transparent;color:var(--t);font-size:14px;font-weight:800;cursor:pointer;}
.rbtn:hover{background:var(--tl);}
.errb{background:var(--reb);color:var(--re);border-radius:8px;padding:9px 13px;font-size:13px;font-weight:600;margin-bottom:12px;}
#APP{display:flex;flex-direction:column;min-height:100vh;}
.ahdr{background:#fff;border-bottom:2px solid var(--tm);padding:0 22px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(46,170,177,.08);}
.hlog{display:flex;align-items:center;gap:9px;font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;color:var(--td);}
.hlm{width:34px;height:34px;background:linear-gradient(135deg,#2eaab1,#1d8a91);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.hsc{font-size:11px;color:var(--gy);font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.husr{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:700;}
.av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#2eaab1,#1d8a91);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:13px;}
.abody{display:flex;flex:1;}
.sbar{width:68px;background:var(--sb);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:3px;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;}
.si{width:54px;height:54px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.6);font-size:8.5px;font-weight:700;gap:3px;text-align:center;border:none;background:transparent;transition:all .18s;}
.si:hover,.si.act{background:rgba(255,255,255,.2);color:#fff;transform:scale(1.05);}
.si .ic{font-size:22px;line-height:1;}
.sdiv{width:38px;height:1px;background:rgba(255,255,255,.2);margin:5px 0;}
.mc{flex:1;padding:20px 24px;overflow-y:auto;min-width:0;}
.card{background:#fff;border-radius:12px;box-shadow:var(--sh);overflow:hidden;}
.chdr{background:var(--t);color:#fff;padding:12px 18px;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:space-between;}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{background:var(--t);color:#fff;padding:10px 12px;text-align:left;font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap;}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--gyl);font-size:13px;vertical-align:middle;}
.tbl td.vtd{padding:0;border-bottom:1px solid var(--gyl);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--tl);}
.tscr{overflow-x:auto;}
.vc{width:100%;min-width:46px;height:58px;min-height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:opacity .15s;gap:2px;padding:4px 2px;box-sizing:border-box;}
.vc:hover{opacity:.82;}
.vcN{font-family:'Roboto',Arial,sans-serif;font-weight:700;font-size:22px;color:#fff;line-height:1;}
.vcS{font-size:9px;color:rgba(255,255,255,.85);line-height:1.2;text-align:center;}
.ve{background:#ecf0f1;width:100%;min-width:46px;height:58px;min-height:58px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-sizing:border-box;}
.ve:hover{background:var(--tm);}
.sc{background:#fff;border-radius:12px;padding:16px 18px;box-shadow:var(--sh);border-left:4px solid var(--t);}
.sc.or{border-left-color:var(--or);}.sc.re{border-left-color:var(--re);}.sc.gr{border-left-color:var(--gr);}
.scn{font-family:'Nunito',sans-serif;font-weight:900;font-size:28px;}
.scl{font-size:11px;color:var(--gy);font-weight:700;margin-top:2px;}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.48);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px;animation:fi .18s;}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:16px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:su .22s ease;}
.modal.mlg{max-width:900px;}
@keyframes su{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
.mhdr{background:var(--t);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-radius:16px 16px 0 0;position:sticky;top:0;z-index:10;}
.mhdr h3{font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;}
.mx{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.25);border:none;color:#fff;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
.mbody{padding:20px;}
.mftr{padding:13px 20px;border-top:1px solid var(--gyl);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;position:sticky;bottom:0;background:#fff;border-radius:0 0 16px 16px;}
.fg2{margin-bottom:14px;overflow:hidden;box-sizing:border-box;}
.fg2 label{display:block;font-weight:700;font-size:12px;margin-bottom:5px;}
.fg2 input:not([type=range]),.fg2 select,.fg2 textarea{width:100%;padding:10px 12px;border:2px solid var(--gyl);border-radius:8px;font-size:13px;outline:none;color:var(--tx);}
.fg2 input[type=range]{width:100%;margin-top:8px;accent-color:var(--t);display:block;padding:0;border:none;background:transparent;}
.fg2 input:focus,.fg2 select:focus,.fg2 textarea:focus{border-color:var(--t);}
.fg2 textarea{min-height:70px;resize:vertical;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.cbar{background:#fff;border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:12px;margin-bottom:16px;box-shadow:var(--sh);flex-wrap:wrap;}
.cnm{font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;}
.ctabs{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto;}
.ct{display:flex;flex-direction:column;align-items:center;padding:5px 9px;border-radius:7px;cursor:pointer;font-size:9px;font-weight:700;color:var(--t);border:none;background:transparent;transition:all .15s;gap:2px;}
.ct:hover,.ct.act{background:var(--tl);}
.ct .ci{font-size:18px;}
.empty{background:#fff;border-radius:12px;padding:36px 24px;text-align:center;box-shadow:var(--sh);}
.empty .ei{font-size:44px;margin-bottom:10px;}
.empty h3{font-family:'Nunito',sans-serif;font-weight:900;font-size:17px;margin-bottom:6px;}
.empty p{color:var(--gy);font-size:13px;margin-bottom:18px;}
.info{background:var(--tl);border-left:4px solid var(--t);border-radius:0 8px 8px 0;padding:10px 14px;font-size:13px;margin-bottom:14px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%);background:var(--gr);color:#fff;padding:11px 22px;border-radius:9px;font-weight:700;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:9999;animation:ta .25s ease;pointer-events:none;}
@keyframes ta{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%)}}
.sphdr{background:linear-gradient(135deg,var(--t),var(--td));color:#fff;padding:22px;border-radius:12px 12px 0 0;text-align:center;}
.spnm{font-family:'Nunito',sans-serif;font-weight:900;font-size:21px;}
.spst{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap;}
.spsi{background:rgba(255,255,255,.2);border-radius:8px;padding:8px 14px;text-align:center;}
.spsn{font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;}
.spsl{font-size:10px;opacity:.85;}
.tbr{display:flex;border-bottom:2px solid var(--gyl);margin-bottom:14px;}
.tbi{padding:9px 15px;cursor:pointer;font-weight:700;font-size:12px;color:var(--gy);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;}
.tbi.act{color:var(--t);border-bottom-color:var(--t);}
.orcell{background:#fff;border-radius:5px;box-shadow:var(--sh);min-height:54px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:700;text-align:center;gap:2px;cursor:pointer;transition:all .15s;padding:4px;position:relative;}
.orcell:hover{background:var(--tl);}
.orcell.today{background:var(--tl);border:2px solid var(--t);}
.orcell.hasl{border-left:3px solid var(--t);}
.ored{position:absolute;top:3px;right:3px;font-size:10px;opacity:0;transition:opacity .15s;}
.orcell:hover .ored{opacity:1;}
.orora{background:#fff;border-radius:5px;box-shadow:var(--sh);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;color:var(--t);min-height:54px;}
.danger-card{background:#fff;border-radius:12px;padding:22px;box-shadow:var(--sh);border-left:4px solid var(--re);}
.danger-card h3{font-family:'Nunito',sans-serif;font-weight:900;font-size:17px;margin-bottom:10px;color:var(--re);}
.danger-card p{font-size:13px;color:var(--gy);margin-bottom:16px;line-height:1.6;}
@media(max-width:700px){.sbar{width:54px;}.si{width:42px;height:42px;}.g2,.g3{grid-template-columns:1fr;}.fr{grid-template-columns:1fr;}.mc{padding:14px;}}
</style>
</head>
<body>
<div id="LP">
  <div class="lbox">
    <div class="llogo"><div class="lico">📚</div><h1>ScuolaOK!</h1><p>Registro Elettronico per Docenti</p></div>
    <div id="lerr" class="errb hidden"></div>
    <div id="LF">
      <div class="fg"><label>Nome utente</label><input type="text" id="lu" autocomplete="username"></div>
      <div class="fg"><label>Password</label><input type="password" id="lpw" autocomplete="current-password"></div>
      <button class="lbtn" onclick="doLogin()">🔓 Accedi</button>
      <div class="ldiv">oppure</div>
      <button class="rbtn" onclick="showReg()">➕ Registrati</button>
    </div>
    <div id="RF" class="hidden">
      <div class="fg"><label>Nome completo</label><input type="text" id="rn"></div>
      <div class="fg"><label>Nome della scuola</label><input type="text" id="rs"></div>
      <div class="fg"><label>Materia principale</label><input type="text" id="rm"></div>
      <div class="fg"><label>Nome utente</label><input type="text" id="ru" autocomplete="username"></div>
      <div class="fg"><label>Password (min. 6 caratteri)</label><input type="password" id="rp" autocomplete="new-password"></div>
      <button class="lbtn" onclick="doReg()">✅ Crea Account</button>
      <div class="ldiv">oppure</div>
      <button class="rbtn" onclick="showLogin()">← Torna al Login</button>
    </div>
  </div>
</div>
<div id="APP" class="hidden">
  <div class="ahdr">
    <div class="hlog"><div class="hlm">📚</div>ScuolaOK!<span class="hsc" id="hSc"></span></div>
    <div class="husr"><div class="av" id="hAv"></div><span id="hNm"></span>
      <button class="btn bo bsm" onclick="doLogout()" style="margin-left:8px">Esci</button>
    </div>
  </div>
  <div class="abody">
    <div class="sbar">
      <button class="si act" id="sb-home" onclick="goto('home')"><span class="ic">🏡</span>Home</button>
      <button class="si" id="sb-registro" onclick="goto('registro')"><span class="ic">📒</span>Registro</button>
      <button class="si" id="sb-scrutini" onclick="goto('scrutini')"><span class="ic">📈</span>Scrutini</button>
      <div class="sdiv"></div>
      <button class="si" id="sb-bacheca" onclick="goto('bacheca')"><span class="ic">🗂️</span>Bacheca</button>
      <button class="si" id="sb-orario" onclick="goto('orario')"><span class="ic">🗓️</span>Orario</button>
      <button class="si" id="sb-calendario" onclick="goto('calendario')"><span class="ic">📅</span>Calendario</button>
      <div class="sdiv"></div>
      <button class="si" id="sb-classi" onclick="goto('classi')"><span class="ic">🎓</span>Classi</button>
      <button class="si" id="sb-colloqui" onclick="goto('colloqui')"><span class="ic">🤝</span>Colloqui</button>
      <button class="si" id="sb-libri" onclick="goto('libri')"><span class="ic">📚</span>Libri</button>
      <button class="si" id="sb-aule" onclick="goto('aule')"><span class="ic">🏫</span>Aule</button>
      <button class="si" id="sb-strumenti" onclick="goto('strumenti')"><span class="ic">🔧</span>Strumenti</button>
    </div>
    <div class="mc" id="MC"></div>
  </div>
</div>
<div id="MW"></div><div id="TW"></div>
<script>
// ── GLOBAL ERROR HANDLER ──
window.onerror = function(msg, src, line, col, err){
  const el = document.getElementById('TW');
  if(el){
    const t=document.createElement('div');
    t.className='toast';t.style.background='#e74c3c';
    t.style.top='10px';t.style.maxWidth='90vw';t.style.whiteSpace='pre-wrap';
    t.textContent='⚠️ JS Error: '+msg+' (line '+line+')';
    el.appendChild(t);setTimeout(()=>t.remove(),6000);
  }
  return false;
};

// ── UTILS ──
function gi(id){return document.getElementById(id);}
function gv(id){const el=gi(id);return el?el.value.trim():'';}
function td(){return new Date().toISOString().split('T')[0];}
function fmtD(iso){if(!iso)return'';const[y,m,d]=iso.split('-');return`${d}/${m}/${y}`;}
function isoD(it){if(!it||!it.includes('/'))return td();const p=it.split('/');return`${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;}
function dSrt(a,b){if(!a||!b)return 0;const p=s=>{const q=s.split('/');return new Date(q[2],q[1]-1,q[0]);};return p(a)-p(b);}
function togEl(id){const e=gi(id);if(e)e.classList.toggle('hidden');}
function selAll(v){document.querySelectorAll('.selA').forEach(c=>c.checked=v);}
function toast(msg,isErr){
  const t=document.createElement('div');t.className='toast';
  t.style.background=isErr?'var(--re)':'var(--gr)';t.textContent=msg;
  gi('TW').appendChild(t);setTimeout(()=>t.remove(),2800);saveLS();
}

// ── STORAGE ──
function saveLS(){try{localStorage.setItem('scuolaok_v2',JSON.stringify(DB.users));}catch(e){}}
function loadLS(){try{const r=localStorage.getItem('scuolaok_v2');if(r)DB.users=JSON.parse(r);}catch(e){}}

// ── DB ──
const DB={users:[]};
loadLS();
function emptyData(){
  return{classi:[],alunni:[],programma:[],compiti:[],appello:[],votiOrali:[],verifiche:[],
    note:[],bacheca:[],eventi:[],orario:{},lezioniPianificate:[],scrutiniProposti:{},colloqui:[],bachecaCls:[],libri:[],bachecaAlunno:[],aule:[],prenotazioni:[]};
}

// ── SESSION ──
let CUR=null,CCLS=null,CTAB='giornale',CMAT=null,CPERIODO=null;
function D(){return CUR?CUR.data:emptyData();}

// ── VOTI ──
const VRAW=[];
VRAW.push({l:'0+',v:0.25});VRAW.push({l:'0½',v:0.5});VRAW.push({l:'10-',v:9.75});
for(let n=1;n<=10;n++){
  if(n>1){VRAW.push({l:(n-1)+'½',v:(n-1)+.5});VRAW.push({l:(n-1)+'+',v:(n-1)+.25});}
  VRAW.push({l:''+n,v:n});
  if(n<10)VRAW.push({l:n+'-',v:n-.25});
}
const seenV=new Set();
const VOTI=VRAW.sort((a,b)=>a.v-b.v).filter(x=>{if(x.v<0.25||seenV.has(x.v))return false;seenV.add(x.v);return true;});
const ANNOTAZIONI=['+-','+','++','-','--'];
const COMPETENZE_LETTERE=['A','B','C','D','E','F'];
const COMPETENZE_DESC=['NA','SA','A','PA'];
const SPECIAL_FUORI=['E','As','G','AM','AL','I','S','Dc','b','O','Ec','CNS','Assente','Esonero'];
function isAnnotazione(v){return ANNOTAZIONI.includes(v);}
function isCompetenza(v){return COMPETENZE_LETTERE.includes(v)||COMPETENZE_DESC.includes(v);}
function isSpecialFuori(v){return SPECIAL_FUORI.includes(v);}
function isExcluded(v){
  if(v===null||v===undefined||v==='')return true;
  return isAnnotazione(v)||isCompetenza(v)||isSpecialFuori(v);
}
function vL(val){
  if(val===null||val===undefined||val==='')return'';
  if(isExcluded(val))return''+val;
  if(typeof val==='string'&&isNaN(+val))return val;
  const f=+val;if(isNaN(f))return''+val;
  const x=VOTI.find(v=>Math.abs(v.v-f)<.01);return x?x.l:f.toFixed(2);
}
function vV(lbl){if(!lbl)return null;const x=VOTI.find(v=>v.l===lbl);return x?x.v:null;}
function gCls(val,numVal){
  if(val===null||val===undefined||val==='')return'ce';
  if(isAnnotazione(val)){if(numVal===undefined||numVal===null||numVal==='')return'cb';const n=+numVal;if(isNaN(n))return'cb';return n>0.5?'cg':n>=-0.5?'co':'cr';}
  if(isCompetenza(val))return'cb';if(isSpecialFuori(val))return'cb';
  if(typeof val==='string'&&isNaN(+val))return'cb';
  const n=+val;if(isNaN(n))return'cb';return n<5?'cr':n<6?'co':'cg';
}
function gHex(val,numVal){const c=gCls(val,numVal);return c==='cr'?'#e74c3c':c==='co'?'#f59300':c==='cg'?'#27ae60':c==='cb'?'#3498db':'#bdc3c7';}
function fmtM(n){return(n===null||n===undefined)?'—':n.toFixed(2);}
function rndV(n){return Math.round(n*4)/4;}
function calcM(items){
  const ok=items.filter(x=>{
    if(x.ex||x.p<=0)return false;
    if(x.v===null||x.v===undefined)return false;
    if(isAnnotazione(x.v)){return x.numVal!==null&&x.numVal!==undefined&&!isNaN(+x.numVal);}
    if(isExcluded(x.v))return false;
    return!isNaN(+x.v);
  });
  if(!ok.length)return null;
  const sp=ok.reduce((s,x)=>s+x.p,0),sv=ok.reduce((s,x)=>{const val=isAnnotazione(x.v)?x.numVal:x.v;return s+(+val)*x.p;},0);
  return sp>0?sv/sp:null;
}
function vOpts(sel='',spec=false){

  const aL={'+-':'± Ondeggiante','+':'+ Positivo','++':'++ Molto positivo','-':'- Negativo','--':'-- Molto negativo'};
  ANNOTAZIONI.forEach(s=>{o+=`<option value="${s}"${s===sel?' selected':''}>${aL[s]||s}</option>`;});
  o+='</optgroup><optgroup label="─ Speciali (fuori media) ─">';
  const sL={E:'Esonero',As:'Assente verifica',G:'Giustifica',AM:'Ammonizione',AL:'Allontanamento',I:'Insufficiente',S:'Sufficiente',Dc:'Discreto',b:'Buono',O:'Ottimo',Ec:'Eccellente',CNS:'Non consegnato'};
  Object.entries(sL).forEach(([k,v])=>{o+=`<option value="${k}"${k===sel?' selected':''}>${k} – ${v}</option>`;});

  o+='</optgroup><optgroup label="─ Livelli A–F ─">';

function periodFilterBar(cls){
  const periodi=CUR.periodi||[];if(!periodi.length)return'';
  const cid=cls.id;
  return`<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:12px;padding:10px 14px;background:#fff;border-radius:10px;box-shadow:var(--sh)">
    <span style="font-size:12px;font-weight:700;color:var(--gy)">📅 Periodo:</span>
    <button onclick="CPERIODO=null;renderTab(D().classi.find(x=>x.id==='${cid}'))"
      style="padding:5px 14px;border-radius:20px;border:2px solid ${CPERIODO===null?'var(--t)':'var(--gyl)'};background:${CPERIODO===null?'var(--t)':'#fff'};color:${CPERIODO===null?'#fff':'var(--td)'};font-weight:700;font-size:12px;cursor:pointer">Tutti</button>
    ${periodi.map(p=>`<button onclick="CPERIODO='${p.id}';renderTab(D().classi.find(x=>x.id==='${cid}'))"
      style="padding:5px 14px;border-radius:20px;border:2px solid ${CPERIODO===p.id?'var(--t)':'var(--gyl)'};background:${CPERIODO===p.id?'var(--t)':'#fff'};color:${CPERIODO===p.id?'#fff':'var(--td)'};font-weight:700;font-size:12px;cursor:pointer">${p.nome}</button>`).join('')}
  </div>`;
}
function filterByPeriod(items){
  if(!CPERIODO)return items;
  const periodo=(CUR.periodi||[]).find(p=>p.id===CPERIODO);if(!periodo)return items;
  const parseIt=s=>{
    if(!s||typeof s!=='string'||!s.includes('/'))return null;
    const p=s.split('/');
    if(p.length!==3)return null;
    const d=new Date(+p[2],+p[1]-1,+p[0]);
    return isNaN(d.getTime())?null:d;
  };
  const dFrom=parseIt(periodo.dal);
  const dTo=parseIt(periodo.al);
  // Se le date del periodo non sono valide, non filtrare
  if(!dFrom||!dTo){return items;}
  return items.filter(item=>{
    const dt=parseIt(item.data||item.perIl);
    return dt&&dt>=dFrom&&dt<=dTo;
  });
}
function notaColor(tipo){
  if(!tipo)return{bg:'var(--tl)',col:'var(--t)',label:'—'};
  const t=tipo.toLowerCase();
  if(t.includes('disciplin')||t.includes('ammoniz')||t.includes('allontan')||t.includes('disturbo')||t.includes('cellulare'))return{bg:'var(--reb)',col:'var(--re)',label:'🔴'};
  if(t.includes('compiti')||t.includes('materiale')||t.includes('preparaz')||t.includes('ritardo'))return{bg:'var(--orb)',col:'var(--or)',label:'🟡'};
  if(t.includes('merito')||t.includes('eccellen')||t.includes('lodevol')||t.includes('comunicaz')||t.includes('avviso')||t.includes('annotaz'))return{bg:'var(--grb)',col:'var(--gr)',label:'🟢'};
  return{bg:'var(--orb)',col:'var(--or)',label:'🟡'};
}

// ── AUTH ──
function doLogin(){
  const u=gv('lu'),p=gv('lpw');
  if(!u||!p){errL('Inserisci nome utente e password.');return;}
  const usr=DB.users.find(x=>x.username===u&&x.password===p);
  if(!usr){errL('Credenziali non valide. Hai un account? Altrimenti clicca Registrati.');return;}
  CUR=usr;
  if(!CUR.data)CUR.data=emptyData();
  if(!CUR.data.lezioniPianificate)CUR.data.lezioniPianificate=[];
  if(!CUR.data.scrutiniProposti)CUR.data.scrutiniProposti={};
  launch();
}
function doReg(){
  const n=gv('rn'),sc=gv('rs'),m=gv('rm'),u=gv('ru'),p=gv('rp');
  if(!n||!sc||!m||!u||!p){errL('Compila tutti i campi.');return;}
  if(p.length<6){errL('La password deve avere almeno 6 caratteri.');return;}
  if(DB.users.find(x=>x.username===u)){errL('Nome utente già in uso.');return;}
  const usr={id:'u'+Date.now(),nome:n,scuola:sc,materia:m,username:u,password:p,data:emptyData()};
  DB.users.push(usr);saveLS();CUR=usr;launch();
}

function cycleStato(aid,cid,data){
  const d=D();
  let ap=d.appello.find(x=>x.aid===aid&&x.cid===cid&&x.data===data);
  if(!ap){ap={id:'ap'+aid+data.replace(/\//g,''),aid,cid,data,stato:'P',ingresso:'',uscita:'',fuoriClasse:'',giustificato:false,motivazione:''};d.appello.push(ap);}
  const cy=['P','A','R','U','F'];ap.stato=cy[(cy.indexOf(ap.stato)+1)%cy.length];
  saveLS();renderTab(d.classi.find(x=>x.id===cid));
}

// ── MATERIA PILLS ──
function matPills(cls){
  const mats=[cls.materia||'',...(cls.altreMaterie||[])].filter((m,i,a)=>m&&a.indexOf(m)===i);
  if(mats.length<=1)return'';
  if(!CMAT||!mats.includes(CMAT))CMAT=mats[0];
  return`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center">
    <span style="font-size:12px;font-weight:700;color:var(--gy)">📚 Materia:</span>
    ${mats.map(m=>`<button onclick="CMAT='${m}';renderTab(D().classi.find(x=>x.id==='${cls.id}'))"
      style="padding:5px 14px;border-radius:20px;border:2px solid ${CMAT===m?'var(--t)':'var(--gyl)'};background:${CMAT===m?'var(--t)':'#fff'};color:${CMAT===m?'#fff':'var(--td)'};font-weight:700;font-size:12px;cursor:pointer">${m}</button>`).join('')}
  </div>`;
}
function getCMAT(cls){
  const mats=[cls.materia||'',...(cls.altreMaterie||[])].filter((m,i,a)=>m&&a.indexOf(m)===i);
  if(mats.length<=1)return null;
  if(!CMAT||!mats.includes(CMAT))CMAT=mats[0];
  return CMAT;
}

  const sessMeta=allMeta.filter(s=>(s.materia||cls.materia)===curMat).sort((a,b)=>dSrt(a.data,b.data));

function stampaScrutinio(clsId,periodoId){
  const d=D();
  const cls=d.classi.find(x=>x.id===clsId);if(!cls)return;

  const mats=[cls.materia||'',...(cls.altreMaterie||[])].filter((m,i,a)=>m&&a.indexOf(m)===i);
  const spKey=clsId+'_'+periodoId;
  const proposti=(d.scrutiniProposti||{})[spKey]||{};
  function getMedia(aid,mat,tipo){
    const parseIt=s=>{if(!s)return null;const p=s.split('/');return new Date(+p[2],+p[1]-1,+p[0]);};

function scaricaScrutinioCSV(clsId,periodoId){
  const d=D();const cls=d.classi.find(x=>x.id===clsId);if(!cls)return;
  const alunni=d.alunni.filter(a=>a.classeId===clsId).sort((a,b)=>a.n-b.n);
  const periodi=CUR.periodi||[];const periodo=periodoId==='__all__'?null:periodi.find(p=>p.id===periodoId);
  const periodoLabel=periodo?periodo.nome:"TuttoAnno";
  const mats=[cls.materia||'',...(cls.altreMaterie||[])].filter((m,i,a)=>m&&a.indexOf(m)===i);
  const spKey=clsId+'_'+periodoId;const proposti=(d.scrutiniProposti||{})[spKey]||{};
  function getM(aid,mat,tipo){
    const parseIt=s=>{if(!s)return null;const p=s.split('/');return new Date(+p[2],+p[1]-1,+p[0]);};
    const inP=item=>{if(!periodo)return true;const dt=parseIt(item.data);if(!dt)return true;const dF=parseIt(periodo.dal)||new Date(0),dT=parseIt(periodo.al)||new Date(9999,0,1);return dt>=dF&&dt<=dT;};
    if(tipo==='orale'){const sm=d.votiOrali.filter(v=>v.classeId===clsId&&v.meta&&(v.materia||cls.materia)===mat);const sids=new Set(sm.map(s=>s.sId));const vcs=d.votiOrali.filter(v=>v.aid===aid&&v.classeId===clsId&&!v.meta&&(v.materia||cls.materia)===mat&&(v.sId?.startsWith('free_')||sids.has(v.sId))).filter(inP);return calcM(vcs.map(v=>({v:v.val,p:v.peso||100,ex:v.ex||false,numVal:v.numVal})));}
    const ver=d.verifiche.filter(v=>v.classeId===clsId&&(tipo==='pratico'?v.tipo==='Pratico':v.tipo!=='Pratico')&&(v.materia||cls.materia)===mat).filter(inP);
    return calcM(ver.map(v=>{const e=(v.voti||{})[aid];return e&&e.val!==undefined?{v:e.val,p:e.ex?0:v.peso,ex:e.ex}:null;}).filter(Boolean));
  }
  function mg(aid,mat){const vals=[getM(aid,mat,'orale'),getM(aid,mat,'scritto'),getM(aid,mat,'pratico')].filter(x=>x!==null);return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;}
  let csv='N°;Cognome Nome';
  mats.forEach(mat=>{csv+=`;${mat} Orale;${mat} Scr.;${mat} Pra.;${mat} Proposto;${mat} Finale`;});
  csv+='\n';
  alunni.forEach(a=>{
    csv+=`${a.n};"${a.nome}"`;
    mats.forEach(mat=>{
      const mO=getM(a.id,mat,'orale'),mS=getM(a.id,mat,'scritto'),mP=getM(a.id,mat,'pratico');
      const saved=proposti[a.id+'_'+mat];
      const prop=saved!==undefined?saved:(mg(a.id,mat)!==null?Math.round(mg(a.id,mat)):null);
      csv+=`;${mO!==null?mO.toFixed(2).replace('.',','):''}`;
      csv+=`;${mS!==null?mS.toFixed(2).replace('.',','):''}`;
      csv+=`;${mP!==null?mP.toFixed(2).replace('.',','):''}`;
      csv+=`;${prop!==null?prop:''}`;
      const scelto=proposti['sc_'+a.id+'_'+mat]||'';
      csv+=`;${scelto}`;
    });
    csv+='\n';
  });
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`Scrutinio_${cls.nome}_${periodoLabel}.csv`;a.click();
  toast('CSV scaricato ✅');
}

function saveImpostazioni(){
  const n=gv('st_nome'),sc=gv('st_scuola'),m=gv('st_mat');
  if(!n||!sc||!m){toast('Compila tutti i campi.',true);return;}
  CUR.nome=n;CUR.scuola=sc;CUR.materia=m;
  gi('hNm').textContent=n;gi('hSc').textContent=sc;
  gi('hAv').textContent=n.split(' ').map(x=>x[0]).slice(0,2).join('');
  saveLS();toast('Impostazioni salvate ✅');
}

function exportData(){
  const blob=new Blob([JSON.stringify(CUR.data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`ScuolaOK_${CUR.username}_${td()}.json`;a.click();
  toast('Backup esportato ✅');
}
function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{const data=JSON.parse(e.target.result);CUR.data=data;saveLS();pgStr(gi('MC'));toast('Dati importati ✅');}
    catch(err){toast('File non valido.',true);}
  };reader.readAsText(file);
}
function deleteAccount(){
  if(!confirm('⚠️ ATTENZIONE\n\nStai per eliminare definitivamente il tuo account e TUTTI i dati.\n\nQuesta operazione è IRREVERSIBILE.\n\nConfermi?'))return;
  if(!confirm('Sei assolutamente sicuro? Tutti i dati verranno persi per sempre.'))return;
  const username=CUR.username;
  DB.users=DB.users.filter(x=>x.username!==username);
  saveLS();
  CUR=null;CCLS=null;CTAB='giornale';CPERIODO=null;
  gi('APP').classList.add('hidden');
  gi('LP').classList.remove('hidden');
  gi('lu').value='';gi('lpw').value='';
  showLogin();
  const e=gi('lerr');
  e.style.background='var(--grb)';e.style.color='var(--gr)';
  e.textContent='✅ Account eliminato con successo.';
  e.classList.remove('hidden');
}

function mk(title,sizeOrBody,bodyOrFtr,ftrOrNone){
  let size='',body,ftr;
  if(sizeOrBody==='lg'){size='mlg';body=bodyOrFtr;ftr=ftrOrNone;}
  else{body=sizeOrBody;ftr=bodyOrFtr;}
  return`<div class="mov" onclick="if(event.target===this)closM()"><div class="modal ${size}">
    <div class="mhdr"><h3>${title}</h3><button class="mx" onclick="closM()">✕</button></div>
    <div class="mbody">${body}</div>
    <div class="mftr">${ftr||''}</div>
  </div></div>`;
}
function spTab(el,pid){
  document.querySelectorAll('.tbi').forEach(t=>t.classList.remove('act'));el.classList.add('act');
  ['tsp0','tsp1','tsp2','tsp3','tsp4'].forEach(id=>{const e=gi(id);if(e)e.classList.toggle('hidden',id!==pid);});
}

function saveLez(cid,lid){
  const arg=gv('ma');if(!arg){toast('Inserisci l\'argomento.',true);return;}
  const ds=fmtD(gv('md')),ora=gi('mora')?.value||'1ª',mat=gi('mmat')?.value||'',nota=gv('mn');
  const cmpTesto=gv('mcmp'),cmpPerIl=fmtD(gv('mperil'));
  let lId=lid;
  if(lid){const l=D().programma.find(x=>x.id===lid);if(l){l.data=ds;l.arg=arg;l.nota=nota;l.materia=mat;l.ora=ora;}}
  else{lId='p'+Date.now();D().programma.push({id:lId,classeId:cid,arg,nota,data:ds,materia:mat,ora});}
  if(cmpTesto){const ec=D().compiti.find(x=>x.lId===lId);if(ec){ec.testo=cmpTesto;ec.perIl=cmpPerIl;}else D().compiti.push({id:'c'+Date.now(),classeId:cid,data:ds,testo:cmpTesto,perIl:cmpPerIl,lId});}
  closM();toast('Lezione salvata ✅');renderTab(D().classi.find(x=>x.id===cid));
}
function delLez(id,cid){CUR.data.programma=D().programma.filter(x=>x.id!==id);renderTab(D().classi.find(x=>x.id===cid));toast('Eliminata');}
function saveSupplenza(cid){
  D().programma.push({id:'p'+Date.now(),classeId:cid,arg:gv('ma')||'Supplenza',nota:'',data:fmtD(gv('md')),materia:gv('msupMat'),ora:gi('mora')?.value||'1ª',supplenzaDi:gv('msupDoc'),isSupplenza:true});
  closM();toast('Supplenza registrata ✅');renderTab(D().classi.find(x=>x.id===cid));
}

function saveOra(cid,aid,tipo,data){
  const orario=gi('morario')?.value;if(!orario){toast('Inserisci un orario.',true);return;}
  let ap=D().appello.find(x=>x.aid===aid&&x.cid===cid&&x.data===data);
  if(!ap){ap={id:'ap'+aid+data.replace(/\//g,''),aid,cid,data,stato:'P',ingresso:'',uscita:'',fuoriClasse:'',giustificato:false,motivazione:''};D().appello.push(ap);}
  if(tipo==='ing'){ap.ingresso=orario;if(ap.stato==='P')ap.stato='R';}
  else if(tipo==='usc'){ap.uscita=orario;if(ap.stato==='P')ap.stato='U';}
  else if(tipo==='fc'){ap.fuoriClasse=orario;if(ap.stato==='P')ap.stato='F';}
  saveLS();closM();toast('Salvato ✅');renderTab(D().classi.find(x=>x.id===cid));
}
function clearOra(cid,aid,tipo,data){
  const ap=D().appello.find(x=>x.aid===aid&&x.cid===cid&&x.data===data);
  if(ap){if(tipo==='ing')ap.ingresso='';else if(tipo==='usc')ap.uscita='';else ap.fuoriClasse='';ap.stato='P';}
  saveLS();closM();toast('Rimosso');renderTab(D().classi.find(x=>x.id===cid));

function saveAllVotiSessOrale(cid,sid){
  const alunni=D().alunni.filter(a=>a.classeId===cid);
  const meta=D().votiOrali.find(v=>v.sId===sid&&v.meta);
  alunni.forEach(a=>{
    const lbl=gi('vsv_'+a.id)?.value,ex=gi('vsx_'+a.id)?.checked||false,comm=gi('vsc_'+a.id)?.value||'';
    const numValRaw=gi('vsn_'+a.id)?.value;
    const numVal=isAnnotazione(lbl)&&numValRaw?parseFloat(numValRaw):undefined;
    if(!lbl){const ex2=D().votiOrali.find(v=>v.sId===sid&&v.aid===a.id&&!v.meta);if(ex2)CUR.data.votiOrali=D().votiOrali.filter(x=>x.id!==ex2.id);return;}
    const val=vV(lbl)!==null?vV(lbl):lbl;
    const ex2=D().votiOrali.find(v=>v.sId===sid&&v.aid===a.id&&!v.meta);
    if(ex2){ex2.val=val;ex2.ex=ex;ex2.comm=comm;if(numVal!==undefined)ex2.numVal=numVal;}
    else D().votiOrali.push({id:'vo'+Date.now()+Math.random(),sId:sid,classeId:cid,aid:a.id,val,data:meta?.data||fmtD(td()),et:meta?.et||'',materia:meta?.materia||'',peso:meta?.peso||100,ex,comm,...(numVal!==undefined?{numVal}:{})});
  });

}
function saveVotoOrale(cid,aid){

  const isAnno=isAnnotazione(lbl);

  const cls=D().classi.find(x=>x.id===cid);const materia=CMAT||cls?.materia||'';
  let sId=gi('msId')?.value||'',et='';

  else{sId='free_'+Date.now();et=data;}

function delClasse(id){
  if(!confirm('Eliminare questa classe e tutti i suoi dati?'))return;
  ['classi','alunni','votiOrali','verifiche','compiti','note','programma'].forEach(k=>{
    if(k==='classi')CUR.data.classi=D().classi.filter(x=>x.id!==id);
    else if(k==='alunni')CUR.data.alunni=D().alunni.filter(x=>x.classeId!==id);
    else if(k==='votiOrali')CUR.data.votiOrali=D().votiOrali.filter(x=>x.classeId!==id);
    else if(k==='verifiche')CUR.data.verifiche=D().verifiche.filter(x=>x.classeId!==id);
    else if(k==='compiti')CUR.data.compiti=D().compiti.filter(x=>x.classeId!==id);
    else if(k==='note')CUR.data.note=D().note.filter(x=>x.cid!==id);
    else if(k==='programma')CUR.data.programma=D().programma.filter(x=>x.classeId!==id);
  });
  CUR.data.appello=D().appello.filter(x=>x.cid!==id);
  if(D().orario[id])delete CUR.data.orario[id];
  saveLS();toast('Classe eliminata');pgStr(gi('MC'));
}
function saveAlunniLista(cid,numRows){
  const newList=[];
  for(let i=0;i<numRows;i++){
    const nome=(gi('rn_'+i)?.value||'').trim();if(!nome)continue;
    const id=gi('rid_'+i)?.value||'';
    const dsa=gi('rdsa_'+i)?.value||'Nessuna',info=gi('rinfo_'+i)?.value||'';
    newList.push({id:id||'a'+Date.now()+i+Math.random().toString(36).slice(2),classeId:cid,n:newList.length+1,nome:nome.toUpperCase(),dsa,info});
  }
  if(!newList.length){toast('Inserisci almeno un alunno.',true);return;}
  CUR.data.alunni=D().alunni.filter(a=>a.classeId!==cid);
  newList.sort((a,b)=>a.nome.localeCompare(b.nome,'it')).forEach((a,i)=>{a.n=i+1;D().alunni.push(a);});
  saveLS();closM();pgStr(gi('MC'));toast(newList.length+' alunni salvati ✅');
}

function saveSessOraleMensile(cid){
  const et=gv('met')||'Sessione Mensile';
  const materia=gi('mmateria')?.value||D().classi.find(x=>x.id===cid)?.materia||'';
  const peso=parseInt(gi('mpeso')?.value||'100')||100;
  const sid='so'+Date.now();
  const alunni=D().alunni.filter(a=>a.classeId===cid);
  // Data di riferimento = data della prima interrogazione o oggi
  const refDataIso=gi('mdDef')?.value||td();
  const refData=fmtD(refDataIso);
  // Crea il meta-record della sessione
  D().votiOrali.push({id:'vM'+Date.now(),sId:sid,classeId:cid,aid:'__meta__',val:null,
    data:refData,et,materia,peso,ex:false,comm:'',meta:true});
  let saved=0;
  alunni.forEach(a=>{
    const lbl=gi('msv_'+a.id)?.value;
    if(!lbl||lbl==='') return; // salta alunno senza voto
    const dataInp=gi('msd_'+a.id)?.value;
    const data=dataInp?fmtD(dataInp):refData;
    const ex=gi('msx_'+a.id)?.checked||false;
    const comm=gi('msc_'+a.id)?.value||'';
    const numValRaw=gi('msn_'+a.id)?.value;
    const numVal=isAnnotazione(lbl)&&numValRaw?parseFloat(numValRaw):undefined;
    const val=vV(lbl)!==null?vV(lbl):lbl;
    D().votiOrali.push({id:'vo'+Date.now()+Math.random(),sId:sid,classeId:cid,aid:a.id,
      val,data,et,materia,peso,ex,comm,...(numVal!==undefined?{numVal}:{})});
    saved++;
  });
  saveLS();
  closM();
  if(saved===0) toast('Nessun voto inserito — sessione creata vuota.');
  else toast(et+': '+saved+' voti salvati ✅');
  renderTab(D().classi.find(x=>x.id===cid));
}

function vOptsScrutinio(sel){
  let o='<option value="">— scegli —</option>';
  // Numerici interi 1-10 più comuni
  for(let n=1;n<=10;n++) o+=`<option value="${n}"${sel==n?' selected':''}>${n}</option>`;
  // Voti decimali comuni
  const dec=[1.5,2,2.5,3,3.5,4,4.5,5,5.5,6,6.5,7,7.5,8,8.5,9,9.5];
  o+='<optgroup label="─── Mezzi voti ───">';
  dec.forEach(v=>{o+=`<option value="${v}"${sel==v?' selected':''}>${v}</option>`;});
  o+='</optgroup>';
  // Voti speciali scrutinio
  o+='<optgroup label="─── Speciali scrutinio ───">';

function stampaProspetto(cid){
  const d=D();const cls=d.classi.find(x=>x.id===cid);if(!cls)return;
  const alunni=d.alunni.filter(a=>a.classeId===cid).sort((a,b)=>a.n-b.n);
  const mats=[cls.materia||'',...(cls.altreMaterie||[])].filter((m,i,a)=>m&&a.indexOf(m)===i);
  const periodi=CUR.periodi||[];
  const periodLabel=CPERIODO?(periodi.find(p=>p.id===CPERIODO)?.nome||'Periodo'):"Tutto l'anno";

  function getM(aid,mat,tipo){
    const parseIt=s=>{if(!s)return null;const p=s.split('/');return new Date(+p[2],+p[1]-1,+p[0]);};
    const inP=item=>{
      if(!CPERIODO)return true;
      const periodo=periodi.find(p=>p.id===CPERIODO);if(!periodo)return true;
      const dt=parseIt(item.data);if(!dt)return true;
      const dF=parseIt(periodo.dal)||new Date(0),dT=parseIt(periodo.al)||new Date(9999,0,1);
      return dt>=dF&&dt<=dT;
    };
    if(tipo==='orale'){
      const sm=d.votiOrali.filter(v=>v.classeId===cid&&v.meta&&(v.materia||cls.materia)===mat);
      const sids=new Set(sm.map(s=>s.sId));
      const vcs=d.votiOrali.filter(v=>v.aid===aid&&v.classeId===cid&&!v.meta&&(v.materia||cls.materia)===mat&&(v.sId?.startsWith('free_')||sids.has(v.sId))).filter(inP);
      return calcM(vcs.map(v=>({v:v.val,p:v.peso||100,ex:v.ex||false,numVal:v.numVal})));
    }
    const ver=d.verifiche.filter(v=>v.classeId===cid&&(tipo==='pratico'?v.tipo==='Pratico':v.tipo!=='Pratico')&&(v.materia||cls.materia)===mat).filter(inP);
    return calcM(ver.map(v=>{const e=(v.voti||{})[aid];return e&&e.val!==undefined?{v:e.val,p:e.ex?0:v.peso,ex:e.ex}:null;}).filter(Boolean));
  }
  function gT(aid,mat){const vs=[getM(aid,mat,'orale'),getM(aid,mat,'scritto'),getM(aid,mat,'pratico')].filter(x=>x!==null);return vs.length?vs.reduce((a,b)=>a+b,0)/vs.length:null;}
  const mc=m=>m===null?'#999':m<5?'#e74c3c':m<6?'#e67e22':'#27ae60';
  const dataOggi=new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'long',year:'numeric'});

  const html=`<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8">
  <title>Prospetto Voti — ${cls.nome}</title>
  <style>
    @page{margin:1.2cm 1.5cm;size:landscape;}
    body{font-family:Arial,sans-serif;font-size:10px;color:#1a1a1a;}
    h1{font-size:15px;margin-bottom:2px;color:#1a4a8a;}
    .sub{font-size:10px;color:#555;margin-bottom:12px;}
    table{width:100%;border-collapse:collapse;}
    th{background:#1a4a8a;color:#fff;padding:5px 6px;font-size:9px;text-align:center;}
    th.left{text-align:left;}
    td{padding:5px 6px;border-bottom:1px solid #e0e6ed;font-size:10px;vertical-align:middle;}
    tr:nth-child(even) td{background:#f4f7fc;}
    .tot{font-weight:900;font-size:12px;}
    .r{color:#e74c3c}.o{color:#e67e22}.g{color:#27ae60}.n{color:#999}
    .footer{margin-top:12px;font-size:9px;color:#888;text-align:right;}
  </style></head><body>
  <h1>Prospetto Voti — ${cls.nome}</h1>
  <div class="sub">${periodLabel} | Docente: ${CUR.nome} | ${dataOggi}</div>
  <table>
    <thead>
      <tr>
        <th class="left" style="min-width:120px">Alunno</th>
        ${mats.map(mat=>`<th colspan="4" style="border-left:3px solid rgba(255,255,255,.3)">${mat}</th>`).join('')}
      </tr>
      <tr style="background:#2a5ba0">
        <th class="left"></th>
        ${mats.map(()=>'<th style="font-size:8px;border-left:1px solid rgba(255,255,255,.2)">Orale</th><th style="font-size:8px">Scritto</th><th style="font-size:8px">Pratico</th><th style="font-size:8px;border-left:2px solid rgba(255,255,255,.5);font-weight:900">Tot.</th>').join('')}
      </tr>
    </thead>
    <tbody>
      ${alunni.map(a=>`<tr>
        <td style="font-weight:700">${a.n}. ${a.nome}</td>
        ${mats.map(mat=>{
          const mO=getM(a.id,mat,'orale'),mS=getM(a.id,mat,'scritto'),mP=getM(a.id,mat,'pratico'),mT=gT(a.id,mat);
          const cc=m=>m===null?'n':m<5?'r':m<6?'o':'g';
          return`<td style="text-align:center;border-left:2px solid #dde3ed" class="${cc(mO)}">${mO!==null?mO.toFixed(2):'—'}</td>
            <td style="text-align:center" class="${cc(mS)}">${mS!==null?mS.toFixed(2):'—'}</td>
            <td style="text-align:center" class="${cc(mP)}">${mP!==null?mP.toFixed(2):'—'}</td>
            <td style="text-align:center;border-left:2px solid #b8cee8;background:#f0f4fa" class="tot ${cc(mT)}">${mT!==null?mT.toFixed(2):'—'}</td>`;
        }).join('')}
      </tr>`).join('')}
    </tbody>
  </table>
  <div class="footer">ScuolaOK! — ${CUR.scuola} — ${dataOggi}</div>
  </body></html>`;

  const w=window.open('','_blank','width=1000,height=700');
  w.document.write(html);w.document.close();w.focus();setTimeout(()=>w.print(),500);
}

              }).join('')+
              `<button onclick="openM('addPrenotazione','${aula.id}','${g.iso}')"
                style="width:100%;border:1px dashed #d0dce8;border-radius:6px;background:transparent;cursor:pointer;color:var(--gym);font-size:14px;padding:3px;margin-top:2px">+</button>`
            }
          </td>`;
        }).join('')}
      </tr>`).join('')}
    </tbody>
  </table>
  </div>`:''} 

  <!-- LISTA AULE -->
  <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;margin-bottom:10px;color:var(--td)">🏛️ Elenco Aule</div>
  ${d.aule.length===0?`<div class="empty"><div class="ei">🏫</div><h3>Nessuna aula</h3><p>Aggiungi le aule della tua scuola.</p></div>`:`
  <div class="g2">
    ${d.aule.map(aula=>`<div class="card" style="border-top:4px solid ${aula.colore||'var(--t)'}">
      <div style="padding:14px 16px">
        <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:18px;color:var(--td);margin-bottom:4px">${aula.nome}</div>
        <div style="font-size:12px;color:var(--gy);margin-bottom:6px">${aula.tipo||'Aula generica'}${aula.piano?' · Piano '+aula.piano:''}${aula.capienza?' · '+aula.capienza+' posti':''}</div>
        ${aula.attrezzature?`<div style="font-size:11px;color:var(--t);margin-bottom:8px">🔧 ${aula.attrezzature}</div>`:''}
        ${aula.note?`<div style="font-size:11px;color:var(--gy)">${aula.note}</div>`:''}
        <div style="display:flex;gap:6px;margin-top:10px">
          <button class="btn bt bsm" onclick="openM('addPrenotazione','${aula.id}','')">📅 Prenota</button>
          <button class="btn bo bsm" onclick="openM('editAula','${aula.id}')">✏️</button>
          <button class="btn br bsm" onclick="delAula('${aula.id}')">🗑️</button>
        </div>
      </div>
    </div>`).join('')}
  </div>`}

  <!-- PRENOTAZIONI FUTURE -->
  ${(()=>{
    const pFuture=d.prenotazioni.filter(p=>p.data>=oggi).sort((a2,b2)=>a2.data>b2.data?1:a2.data<b2.data?-1:a2.oraInizio-b2.oraInizio);
    if(!pFuture.length) return '';
    return`<div style="margin-top:24px">
      <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;margin-bottom:10px;color:var(--td)">📋 Prossime prenotazioni</div>
      <div class="card"><table class="tbl">
        <thead><tr><th>DATA</th><th>ORA</th><th>AULA</th><th>CLASSE/DOCENTE</th><th>MOTIVO</th><th></th></tr></thead>
        <tbody>${pFuture.map(p=>{
          const aula=d.aule.find(x=>x.id===p.aulaId);
          const cls=D().classi.find(x=>x.id===p.clsId);
          const ore2=['1ª','2ª','3ª','4ª','5ª','6ª','7ª','8ª'];
          const dataFmt=p.data.split('-').reverse().join('/');
          return`<tr>
            <td style="font-weight:700;white-space:nowrap">${dataFmt}</td>
            <td style="font-size:12px">${ore2[p.oraInizio-1]||'—'}${p.oraFine&&p.oraFine!==p.oraInizio?' → '+ore2[p.oraFine-1]:''}</td>
            <td><span style="background:${aula?.colore||'var(--t)'}22;color:${aula?.colore||'var(--t)'};border-radius:5px;padding:2px 8px;font-size:12px;font-weight:700">${aula?.nome||'—'}</span></td>
            <td style="font-weight:700">${cls?.nome||p.docente||'—'}</td>
            <td style="font-size:12px;color:var(--gy)">${p.motivo||'—'}</td>
            <td style="white-space:nowrap">
              <button class="btn bo bsm" onclick="openM('editPrenotazione','${p.id}')">✏️</button>
              <button class="btn br bsm" style="margin-left:3px" onclick="delPrenotazione('${p.id}')">🗑️</button>
            </td>
          </tr>`;}).join('')}
        </tbody>
      </table></div>
    </div>`;
  })()}`;
}

function delAula(id){
  if(!confirm('Eliminare questa aula e tutte le sue prenotazioni?'))return;
  CUR.data.aule=D().aule.filter(x=>x.id!==id);
  CUR.data.prenotazioni=D().prenotazioni.filter(x=>x.aulaId!==id);
  saveLS();pgAule(gi('MC'));toast('Aula eliminata');
}
function delPrenotazione(id){
  CUR.data.prenotazioni=D().prenotazioni.filter(x=>x.id!==id);
  saveLS();pgAule(gi('MC'));toast('Prenotazione eliminata');
}
function saveAula(eid){
  const nome=gv('maulaNome');if(!nome){toast('Inserisci il nome.',true);return;}
  if(!D().aule)CUR.data.aule=[];
  const entry={
    id:eid||'aul'+Date.now(),nome,
    tipo:gi('maulaTipo')?.value||'Aula',
    piano:gv('maulaPiano'),
    capienza:gv('maulaCapienza'),
    attrezzature:gv('maulaAttr'),
    colore:gi('maulaCol')?.value||'#2eaab1',
    note:gv('maulaNota')
  };
  if(eid){const idx=D().aule.findIndex(x=>x.id===eid);if(idx>=0)CUR.data.aule[idx]=entry;}
  else D().aule.push(entry);
  saveLS();closM();pgAule(gi('MC'));toast('Aula salvata ✅');
}
function savePrenotazione(eid){
  const aulaId=gi('mpaulaId')?.value,data=gi('mpdata')?.value;
  if(!aulaId||!data){toast('Seleziona aula e data.',true);return;}
  const oraI=parseInt(gi('mporaI')?.value||'1');
  const oraF=parseInt(gi('mporaF')?.value||'1');
  if(!D().prenotazioni)CUR.data.prenotazioni=[];
  // Controlla conflitti
  const conflitti=D().prenotazioni.filter(p=>
    p.id!==eid&&p.aulaId===aulaId&&p.data===data&&
    !(p.oraFine<oraI||p.oraInizio>oraF)
  );
  if(conflitti.length>0){
    toast('⚠️ Conflitto: aula già prenotata in quell\'orario!',true);return;
  }
  const entry={
    id:eid||'pren'+Date.now(),
    aulaId,data,
    oraInizio:oraI,oraFine:oraF,
    clsId:gi('mpclsId')?.value||'',
    docente:gv('mpdocente'),
    motivo:gv('mpmotivo'),
    colore:gi('mpcolore')?.value||'#2eaab1',
    ricorrente:gi('mpric')?.checked||false
  };
  if(eid){const idx=D().prenotazioni.findIndex(x=>x.id===eid);if(idx>=0)CUR.data.prenotazioni[idx]=entry;}
  else D().prenotazioni.push(entry);
  saveLS();closM();pgAule(gi('MC'));toast('Prenotazione salvata ✅');
}
</script>
</body>
</html>
